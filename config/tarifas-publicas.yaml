# Rate shopping vía conectores MCP de viajes (vista de cliente, datos estructurados).
# Lo usa el Skill tarifas-canales. NO requiere scraping ni login.
#
# Conectores MCP usados (por nombre base; el prefijo del servidor varía por sesión):
#   - Booking      -> accommodations_search   (precio exacto por hotel/fecha, acepta hotel_names)
#   - Trivago      -> trivago-accommodation-radius-search / -accommodation-search /
#                     -search-suggestions      (metabuscador: precio + CANAL/OTA por hotel)
#   - Tripadvisor  -> hotel_details / compare_hotels  (precio en vivo + reviews)
#   - Expedia-like -> search_hotels (gateway)  (precio por noche/total, orden por más barato)
#
# Respaldo (solo si los MCP no están disponibles en la sesión): scripts/scrape-tarifas.py
# con las URLs públicas (campo plataformas.booking / .expedia más abajo).

# Parámetros generales de las consultas
consulta:
  moneda: "CLP"              # moneda objetivo del reporte; el Skill convierte/anota origen
  pais: "CL"
  idioma: "es-CL"
  offsets_dias: [7, 30, 90]  # un check-in por cada offset desde hoy
  noches: 1
  ocupaciones:
    - adultos: 2
      ninos: 0
      habitaciones: 1
  radio_competencia_km: 2    # radio para el set competitivo en Trivago (radius search)

# Hoteles propios a monitorear.
#   nombre_busqueda : nombre canónico para Booking/Tripadvisor (accommodations_search / hotel_details)
#   coordenadas     : para Trivago radius search (set competitivo alrededor)
#   ids             : identificadores conocidos (aceleran y desambiguan; opcionales)
hoteles_propios:
  - id: almasur-providencia
    nombre: "Almasur Providencia"
    nombre_busqueda: "Almasur Providencia, Santiago, Chile"
    ciudad: "Santiago, Chile"
    coordenadas: { lat: -33.427393, lon: -70.610616 }
    ids:
      booking: 8120443
      tripadvisor_geo: 24862489
    plataformas:          # solo para el respaldo Playwright (opcional)
      booking: "https://www.booking.com/hotel/cl/almasur-providencia.html"
      expedia: ""

  - id: almasur-express
    nombre: "Almasur Express"
    nombre_busqueda: "Almasur Express, Punta Arenas, Chile"
    ciudad: "Punta Arenas, Chile"
    coordenadas: {}       # completar lat/lon para el set competitivo en Trivago
    ids: {}
    plataformas:
      booking: ""
      expedia: ""

# Competidores explícitos a comparar (opcional; además del set automático de Trivago).
# Se consultan por nombre con Booking/Tripadvisor, o con compare_hotels (Tripadvisor).
competidores:
  # - id: competidor-1
  #   nombre: "Hotel Competidor 1"
  #   nombre_busqueda: "Hotel Competidor 1, Santiago, Chile"
  #   ciudad: "Santiago, Chile"
